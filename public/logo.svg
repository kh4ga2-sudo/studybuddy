<svg width="900" height="220" viewBox="0 0 900 220" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="sbGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>

    <pattern id="stripePattern" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="transparent"/>
      <rect y="4" width="10" height="2" fill="#C084FC"/>
    </pattern>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Monogram -->
  <g transform="translate(20,20)" filter="url(#shadow)">
    <text
      x="0"
      y="90"
      font-family="Georgia, Times New Roman, serif"
      font-size="110"
      font-weight="700"
      fill="url(#stripePattern)"
      stroke="url(#sbGradient)"
      stroke-width="3">
      SB
    </text>
  </g>

  <!-- Divider -->
  <line x1="210" y1="82" x2="240" y2="82"
        stroke="#8B5CF6" stroke-width="2"/>

  <!-- Book Icon -->
  <g transform="translate(250,58)">
    <rect x="0" y="0" width="42" height="8" rx="4"
          fill="url(#sbGradient)"/>
    <rect x="3" y="12" width="42" height="8" rx="4"
          fill="url(#sbGradient)"/>
    <rect x="0" y="24" width="42" height="8" rx="4"
          fill="url(#sbGradient)"/>
  </g>

  <line x1="305" y1="82" x2="335" y2="82"
        stroke="#8B5CF6" stroke-width="2"/>

  <!-- Brand Name -->
  <text
    x="355"
    y="92"
    font-family="Georgia, Times New Roman, serif"
    font-size="46"
    letter-spacing="4"
    fill="#6D28D9">
    STUDY BUDDY
  </text>

</svg>
