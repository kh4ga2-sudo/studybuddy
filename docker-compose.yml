services:
  postgres:
    image: postgres:16
    container_name: studybuddy_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: studybuddy
    ports:
      - "5432:5432"
    volumes:
      - studybuddy_pgdata:/var/lib/postgresql/data
volumes:
  studybuddy_pgdata:
